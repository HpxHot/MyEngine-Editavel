<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            background-color: #f5f0f0;
            color: #1e1e2e;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            border: 2px solid #1e1e34;
            background-color: #e9e9ef;
        }
        .score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const box = 20;
        const snake = [{x: 9 * box, y: 9 * box}];
        let direction;
        let food = {
            x: Math.floor(Math.random() * 20) * box,
            y: Math.floor(Math.random() * 20) * box,
        };
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;

        document.addEventListener("keydown", changeDirection);
        function changeDirection(event) {
            if (event.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
            else if (event.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
            else if (event.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
            else if (event.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
        }

        canvas.addEventListener('touchstart', handleTouch);
        canvas.addEventListener('touchmove', handleTouch);

        function handleTouch(event) {
            const touch = event.touches[0];
            const touchX = touch.clientX - canvas.getBoundingClientRect().left;
            const touchY = touch.clientY - canvas.getBoundingClientRect().top;
            const snakeHead = snake[0];

            if (touchX < snakeHead.x) direction = "LEFT";
            else if (touchX > snakeHead.x) direction = "RIGHT";
            else if (touchY < snakeHead.y) direction = "UP";
            else if (touchY > snakeHead.y) direction = "DOWN";
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x === array[i].x && head.y === array[i].y) {
                    return true;
                }
            }
            return false;
        }

        function draw() {
            if (snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height || collision(snake[0], snake.slice(1))) {
                clearInterval(game);
                alert('Game Over!');
                if (score > highScore) {
                    localStorage.setItem('highScore', score);
                    highScore = score;
                }
                return;
            }

            ctx.fillStyle = '#f5f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#50fa7b';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, box, box);

            const snakeHeadX = snake[0].x;
            const snakeHeadY = snake[0].y;

            if (snakeHeadX === food.x && snakeHeadY === food.y) {
                score++; 
                food = {
                    x: Math.floor(Math.random() * 20) * box,
                    y: Math.floor(Math.random() * 20) * box,
                };
            } else {
                snake.pop();
            }

            const newHead = {
                x: snakeHeadX + (direction === "LEFT" ? -box : direction === "RIGHT" ? box : 0),
                y: snakeHeadY + (direction === "UP" ? -box : direction === "DOWN" ? box : 0)
            };
            snake.unshift(newHead);

            document.querySelector('.score').innerText = 'Score: ' + score;
        }

        let game = setInterval(draw, 100);
    </script>
</body>
</html>
